name = "baza-rosta-ai"
main = "worker.js"
compatibility_date = "2026-07-01"

# Создать базу: npx wrangler d1 create baza-rosta-db
# и вставить сюда database_id из вывода команды
[[d1_databases]]
binding = "DB"
database_name = "baza-rosta-db"
database_id = "19fc0495-3bd1-4eb8-87c5-54fd18745c80"

[vars]
DEEPSEEK_MODEL = "deepseek-v4-flash"
# DEEPSEEK_API_KEY задаётся секретом: npx wrangler secret put DEEPSEEK_API_KEY
